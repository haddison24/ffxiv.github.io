<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" contents="width=device-width, initial-scale=1.0"/>
    <title>Search Jobs - XIV Job Manual</title>
<link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
    
    <canvas id="stars"></canvas>

    <nav class="navbar navbar-expand-lg site-nav">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="index.html">
                 XIV Job Compendium
            </a>
            <div class="nav-links">
                <a href = "index.html" class="nav-link">Dashboard</a>
                <a href = "search.html" class="nav-link">Search Jobs</a>
            </div>
        </div>

        <div class="page-header">
            <div class="container">
                <h1 class="page-title">Search Jobs</h1>
                <p class="page-sub">Find any Job or Class in FFXIV</p>
            </div>
        </div>

        <main class="container main-content">
            
            <div class ="search-bar-wrap">
                <div class="search-input-group">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search for a Job or Class...(e.g., Gladiator, Conjurer)"/>
                    <button id="searchButton" class="btn btn-primary">Search</button>
                </div>

                <div class="fliter-row mt-3">
                    <span class="filter-label">Filter by Role:</span>
                    <button class ="filter-pill active" data-role="all" onclick="setRole(this, 'all')">All</button>
                    <button class ="filter-pill" data-role="tank" onclick="setRole(this, 'tank')">Tank</button>
                    <button class ="filter-pill" data-role="healer" onclick="setRole(this, 'healer')">Healer</button>
                    <button class ="filter-pill" data-role="dps" onclick="setRole(this, 'dps')">DPS</button>
                    <button class ="filter-pill" data-role="class" onclick="setRole(this, 'class')">Class</button>
                </div>
            </div>

            <div id="error-msg" class="alert alert-danger mt-3 d-none"> 
                No results found. Please try a different search term.
            </div>
            
            <div class="results-meta mt-3 mb-3" id="results-meta"></div>

            <div class="row g-3" id="results-grid">
                <div class="col-12 text-center loading-msg">
                    <div class="spinner"></div>
                    <p>Loading jobs...</p>
                </div>
            </div>
        </main>

         <footer class="site-footer">
            <p>Data sourced from <a href="https://v2.xivapi.com" target="_blank">XIVAPI v2</a></p>
        </footer>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="api.js"></script>
        <script src="search.js"></script>
      </body>
    </html>

</html>
