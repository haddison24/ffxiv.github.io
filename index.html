<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>XIV Job Manual</title>
    <link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    
    <canvas id="stars"></canvas>

    <nav class="navbar navbar-expand-lg sticky-top px-4 site-nav">
        <div class="container-fluid ">
            <a class="navbar-brand fw-semibold site-brand" href="index.html">XIV Job Manual </a>
            <div class="d-flex gap-4">
                <a href = "index.html" class="nav-link text-uppercase fw-semibold active-link">Dashboard</a>
                <a href = "search.html" class="nav-link text-uppercase fw-semibold muted-link">Search Jobs</a>
            </div>
        </div>
    </nav>

    <header class="py-5 text-center position-relative hero-section">
        <div class="hero-glow"></div>
        <div class="container">
            <p class="text-uppercase small fw-semibold letter-wide mb-2 accent-text">Final Fantasy XIV</p>
            <h1 class="display-3 fw-bold mb-3 gradient-title"> Job Manual</h1>
            <p class="lead fst-italic text-secondary mx-auto mb-4" style="max-width:520px">
                Explore every Job and Class in Eorzea - from humble crafts to legendary heroes.
            </p>
            <a href="search.html" class="btn btn-lg px-5 rounded-pill btn-glow">Explore All Jobs</a>
        </div>

    </header>

    <section class="py-4 border-top border-bottom stats-section">
        <div class="container">
            <div class="row text-center g-0">
                <div class="col-4 border-end">
                    <div class="fs-1 fw-bold accent-text" id ="stat-total">-</div>
                    <div class="text-uppercase small text-secondary letter-wide">Total Jobs</div>
                </div>
                <div class="col-4 border-end">
                    <div class="fs-1 fw-bold accent-text" id ="stat-dps">-</div>
                    <div class="text-uppercase small text-secondary letter-wide">DPS Roles</div>
                </div>
                <div class="col-4">
                    <div class="fs-1 fw-bold accent-text" id ="stat-support">-</div>
                    <div class="text-uppercase small text-secondary letter-wide">Tank & Healers</div>
                </div>
            </div>
        </div>
    </section>

    <main class="container py-5">

        <div id="error-msg" class="alert alert-danger d-none" role="alert"></div>

        <section class="mb-5">
            <div class="d-flex align-items-center gap-3 mb-3">
                <span class="badge rounded-pill border px-3 py-2 badge-tank">TANK</span>
                <hr class="flex-grow-1 m-0 border-secondary">
            </div>
            <div class="row g-3" id="cards-tank"></div>
        </section>

        <section class="mb-5">
            <div class="d-flex align-items-center gap-3 mb-3">
                <span class="badge rounded-pill border px-3 py-2 badge-healer">HEALER</span>
                <hr class="flex-grow-1 m-0 border-secondary">
            </div>
            <div class="row g-3" id="cards-healer"></div>
        </section>

        <section class="mb-5">
            <div class="d-flex align-items-center gap-3 mb-3">
                <span class="badge rounded-pill border px-3 py-2 badge-dps">DPS</span>
                <hr class="flex-grow-1 m-0 border-secondary">
            </div>
            <div class="row g-3" id="cards-dps"></div>
        </section>

        <section class="mb-5">
            <div class="d-flex align-items-center gap-3 mb-3">
                <span class="badge rounded-pill border px-3 py-2 badge-class">BASE CLASSES</span>
                <hr class="flex-grow-1 m-0 border-secondary">
            </div>
            <div class="row g-3" id="cards-class"></div>
        </section>

    </main>

    <footer class="site-footer">
        <p>Data sourced from <a href="https://v2.xivapi.com" target="_blank">XIVAPI v2</a></p>
    </footer>
        
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="api.js"></script>
    <script src="search.js"></script>
</body>
</html>
