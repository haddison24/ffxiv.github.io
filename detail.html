<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Jobs — XIV Job Manual</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <canvas id="stars"></canvas>

  
  <nav class="navbar navbar-expand-lg sticky-top px-4 site-nav">
    <div class="container-fluid">
      <a class="navbar-brand fw-semibold site-brand" href="index.html">XIV Job Manual</a>
      <div class="d-flex gap-4">
        <a href="index.html" class="nav-link text-uppercase small fw-semibold muted-link">Dashboard</a>
        <a href="search.html" class="nav-link text-uppercase small fw-semibold active-link">Search</a>
      </div>
    </div>
  </nav>

  
  <div class="py-4 border-bottom page-header-section">
    <div class="container">
      <h2 class="fw-bold mb-1 gold-text">Search Jobs</h2>
      <p class="text-secondary fst-italic mb-0">Find any class or job in Eorzea</p>
    </div>
  </div>

  <main class="container py-4">

    
    <div class="card border rounded-3 p-3 mb-4 surface-card">

      
      <div class="input-group mb-3">
        <span class="input-group-text surface-card border-secondary text-secondary">⚔</span>
        <input
          type="text"
          id="search-input"
          class="form-control surface-card text-light border-secondary"
          placeholder="Search by name... (e.g. Paladin, Summoner)"

        />
        <button class="btn btn-glow px-4" onclick="doSearch()">Search</button>
        <button class="btn btn-outline-secondary px-3" onclick="doReset()">Reset</button>
      </div>

      
      <div class="d-flex align-items-center flex-wrap gap-2">
        <span class="text-uppercase small text-secondary letter-wide me-1">Filter by role:</span>
        <button class="btn btn-sm rounded-pill filter-pill active" data-role="all"    onclick="setRole(this,'all')">All</button>
        <button class="btn btn-sm rounded-pill filter-pill"        data-role="tank"   onclick="setRole(this,'tank')">Tank</button>
        <button class="btn btn-sm rounded-pill filter-pill"        data-role="healer" onclick="setRole(this,'healer')">Healer</button>
        <button class="btn btn-sm rounded-pill filter-pill"        data-role="dps"    onclick="setRole(this,'dps')">DPS</button>
        <button class="btn btn-sm rounded-pill filter-pill"        data-role="class"  onclick="setRole(this,'class')">Base Class</button>
      </div>
    </div>

    <div id="error-msg" class="alert alert-danger d-none"></div>

    
    <p class="small fst-italic text-secondary mb-3" id="results-meta"></p>

    
    <div class="row g-3" id="results-grid">
      <div class="col-12 text-center py-5 text-secondary">
        <div class="spinner-border spinner-border-sm text-secondary mb-2" role="status"></div>
        <p class="fst-italic">Loading jobs…</p>
      </div>
    </div>

    
    <div class="d-flex justify-content-center gap-2 mt-4" id="pagination-wrap"></div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="api.js?v=2"></script>
  <script src="search.js"></script>
</body>
</html>
